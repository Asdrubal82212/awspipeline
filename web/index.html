<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline AWS</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            height: 100vh;
            background: linear-gradient(135deg, #232F3E, #DED9D8);
            font-family: Arial, sans-serif;
        }
        h1 {
            color: white;
            font-size: 80px;
            letter-spacing: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }
        .btn-refresh {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #FF9900;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-refresh:hover {
            background: #e68a00;
        }
        .btn-refresh.spinning svg {
            animation: spin 0.7s ease;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>STAGE PIPELINE</h1>

    <button class="btn-refresh" id="btn" onclick="refresh()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M8 16H3v5"/>
        </svg>
        Actualizar
    </button>

    <script>
        function refresh() {
            const btn = document.getElementById('btn');
            btn.classList.add('spinning');
            btn.disabled = true;
            setTimeout(() => {
                btn.classList.remove('spinning');
                btn.disabled = false;
            }, 800);
        }
    </script>
</body>
</html>
